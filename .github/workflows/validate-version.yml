name: Validate Version Bump

on:
  pull_request:
    branches:
      - main
      - beta

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure PR comes from beta
        run: |
          if [ "${{ github.head_ref }}" != "beta" ]; then
            echo "❌ ERROR: Pull requests to main must originate from beta."
            exit 1
          fi

      - name: Compare VERSION with main
        run: |
          git fetch origin main || echo "Main branch might not exist locally"
          
          CURRENT_VERSION=$(cat VERSION | tr -d '\n' | xargs)
          MAIN_VERSION=$(git show origin/main:VERSION 2>/dev/null | tr -d '\n' | xargs || echo "0.0.0")

          echo "Current PR version: $CURRENT_VERSION"
          echo "Main branch version: $MAIN_VERSION"

          if [ "$CURRENT_VERSION" = "$MAIN_VERSION" ]; then
            echo "❌ ERROR: The version in the VERSION file has not been incremented from main. Please bump the version in the VERSION file."
            exit 1
          fi

          echo "✅ Version validation passed"
