name: Validate Version Bump

on:
  pull_request:
    branches:
      - main
      - beta
  push:
    branches:
      - main
      - beta

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure PR comes from beta (only if targeting main)
        run: |
          if [ "${{ github.base_ref }}" = "main" ] && [ "${{ github.head_ref }}" != "beta" ]; then
            echo "❌ ERROR: Pull requests to main must originate from beta."
            exit 1
          fi

      - name: Enforce Odd/Even versioning policy
        run: |
          CURRENT_VERSION=$(cat VERSION | tr -d '\n' | xargs)
          # Extract the minor version (the Y in X.Y.Z)
          MINOR_VERSION=$(echo $CURRENT_VERSION | cut -d. -f2)
          
          # Check if minor is odd or even
          if [ $((MINOR_VERSION % 2)) -ne 0 ]; then
            TYPE="BETA (ODD)"
            ALLOWED_BRANCH="beta"
          else
            TYPE="PRODUCTION (EVEN)"
            ALLOWED_BRANCH="main"
          fi
          
          echo "🔍 Version detected: $CURRENT_VERSION (Minor: $MINOR_VERSION -> $TYPE)"
          
          TARGET_BRANCH="${{ github.base_ref }}"
          # If it's a push to a branch (not a PR), github.base_ref is empty.
          # We use github.ref_name for push events.
          CURRENT_BRANCH="${{ github.head_ref || github.ref_name }}"
          
          # Enforce policy ONLY on main and beta branches
          if [[ "$CURRENT_BRANCH" == "main" || "$CURRENT_BRANCH" == "beta" ]]; then
            if [ "$CURRENT_BRANCH" != "$ALLOWED_BRANCH" ]; then
              echo "❌ ERROR: Versioning Policy Violation!"
              echo "   Version $CURRENT_VERSION ($TYPE) is NOT allowed on branch '$CURRENT_BRANCH'."
              echo "   Please use the '$ALLOWED_BRANCH' branch for this version series."
              exit 1
            fi
            echo "✅ Version $CURRENT_VERSION aligns with branch '$CURRENT_BRANCH'."
          else
            echo "ℹ️ INFO: Branch '$CURRENT_BRANCH' is exempt from strict versioning policy."
          fi
          
          echo "✅ Version $CURRENT_VERSION aligns with branch '$CURRENT_BRANCH'."

      - name: Compare VERSION with target branch
        run: |
          TARGET_BRANCH="${{ github.base_ref }}"
          if [ -z "$TARGET_BRANCH" ]; then
            echo "Skipping comparison (not a PR event)."
            exit 0
          fi
          
          git fetch origin $TARGET_BRANCH || echo "Base branch '$TARGET_BRANCH' might not exist locally"
          
          CURRENT_VERSION=$(cat VERSION | tr -d '\n' | xargs)
          BASE_VERSION=$(git show origin/$TARGET_BRANCH:VERSION 2>/dev/null | tr -d '\n' | xargs || echo "0.0.0")

          echo "Current PR version: $CURRENT_VERSION"
          echo "Target branch ($TARGET_BRANCH) version: $BASE_VERSION"

          if [ "$CURRENT_VERSION" = "$BASE_VERSION" ] && [ "$TARGET_BRANCH" = "main" ]; then
            echo "❌ ERROR: The version in the VERSION file has not been incremented from $TARGET_BRANCH. Please bump the version in the VERSION file."
            exit 1
          fi

          echo "✅ Version validation passed"
