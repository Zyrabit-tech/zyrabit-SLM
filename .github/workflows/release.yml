name: Release and Deploy

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          VERSION_VAL=$(cat VERSION | tr -d '\n' | xargs)
          echo "tag=v${VERSION_VAL}" >> $GITHUB_OUTPUT
          echo "version=${VERSION_VAL}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./zyrabit-slm/api-rag
          file: ./zyrabit-slm/api-rag/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            zyrabitcore/zyrabit-slm:${{ steps.version.outputs.version }}
            zyrabitcore/zyrabit-slm:latest
            zyrabitcore/zyrabit-slm:upgrade

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Upgrade ${{ steps.version.outputs.tag }}
          generate_release_notes: true
