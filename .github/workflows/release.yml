name: Release and Deploy

on:
  push:
    branches:
      - main
      - beta

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          VERSION_VAL=$(cat VERSION | tr -d '\n' | xargs)
          echo "tag=v${VERSION_VAL}" >> $GITHUB_OUTPUT
          echo "version=${VERSION_VAL}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository owner
        id: repo_owner
        run: |
          echo "val=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # 1. Login Zero-Trust a GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Login a Docker Hub (OJO: Usa un PAT, no tu password root)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      # 3. Escaneo de vulnerabilidades en el código base ANTES de compilar
      - name: Run Trivy vulnerability scanner in repo
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './zyrabit-slm/api-rag'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 4. El Doble Push Mágico
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./zyrabit-slm/api-rag
          file: ./zyrabit-slm/api-rag/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ github.ref == 'refs/heads/main' && format('zyrabitcore/zyrabit-slm:{0}', steps.version.outputs.version) || '' }}
            ${{ github.ref == 'refs/heads/main' && 'zyrabitcore/zyrabit-slm:latest' || '' }}
            ${{ github.ref == 'refs/heads/beta' && format('zyrabitcore/zyrabit-slm:beta-{0}', steps.version.outputs.version) || '' }}
            ghcr.io/${{ steps.repo_owner.outputs.val }}/zyrabit-slm:${{ github.ref == 'refs/heads/main' && steps.version.outputs.version || format('beta-{0}', steps.version.outputs.version) }}
            ${{ github.ref == 'refs/heads/main' && format('ghcr.io/{0}/zyrabit-slm:latest', steps.repo_owner.outputs.val) || '' }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Upgrade ${{ steps.version.outputs.tag }}
          generate_release_notes: true
