name: CI

on:
  pull_request:
    branches: [beta, main]
  push:
    branches: [beta]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  contribution-policy:
    name: Contribution Policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR base branch policy
        if: github.event_name == 'pull_request'
        run: |
          echo "PR: ${{ github.head_ref }} → ${{ github.base_ref }}"
          if [ "${{ github.base_ref }}" = "main" ] && [ "${{ github.head_ref }}" != "beta" ]; then
            echo "❌ ERROR: Only 'beta' can merge into 'main'."
            echo "   Your branch '${{ github.head_ref }}' must target 'beta' first."
            exit 1
          fi
          if [ "${{ github.base_ref }}" != "beta" ] && [ "${{ github.base_ref }}" != "main" ]; then
            echo "❌ ERROR: Pull requests must target 'beta' or 'main'."
            exit 1
          fi
      - name: Policy check summary
        run: echo "Contribution policy check passed."

  tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: contribution-policy
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-path: |
            requirements.txt
            zyrabit-slm/api-rag/requirements.txt

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Validate Python imports/compilation
        run: |
          uv run python -m compileall slm_console.py secure_agent.py zyrabit-slm/api-rag/app

      - name: Run API tests
        run: uv run pytest

  production-build-gate:
    name: Production Build Gate
    runs-on: ubuntu-latest
    needs: tests
    if: github.base_ref == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Production Compose Configuration
        run: |
          cd zyrabit-slm
          touch .env
          PROMETHEUS_BASIC_AUTH="dummy:dummy" GRAFANA_BASIC_AUTH="dummy:dummy" OLLAMA_NUM_PARALLEL=1 docker compose config -q
          echo "✅ Production docker-compose.yml is valid."

      - name: Integrity Check (Structure)
        run: |
          if [ ! -f zyrabit-slm/api-rag/app/HEXAGONAL_ARCHITECTURE.md ]; then
            echo "❌ ERROR: HEXAGONAL_ARCHITECTURE.md is missing!"
            exit 1
          fi
          echo "✅ Architectural documentation present."
