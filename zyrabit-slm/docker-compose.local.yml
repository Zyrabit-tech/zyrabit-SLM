services:
  # 1. THE BRAIN: API RAG
  zyrabit-api:
    build:
      context: ./api-rag
    container_name: zyrabit-api
    env_file:
      - .env
    environment:
      - N8N_SERVICE_TOKEN_FILE=/run/secrets/n8n_service_token
      - N8N_WEBHOOK_SIGNING_SECRET_FILE=/run/secrets/n8n_webhook_signing_secret
      - SLM_URL=http://host.docker.internal:11434
      - DB_URL=http://zyrabit-db:8000
    # depends_on:
    #   zyrabit-db:
    #     condition: service_started
    #   zyrabit-engine:
    #     condition: service_started
    ports:
      - "8080:8080" # Direct HTTP access
    networks:
      - backend-network
      - model-network
    volumes:
      - ./secrets:/run/secrets:ro
      - ./prompts:/app/prompts:ro
      - ./document_source:/app/document_source
      - ../README.md:/app/README.md:ro # For auto-ingest
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 1.5 THE FACE: Web UI
  zyrabit-web:
    build:
      context: ./web-ui
    container_name: zyrabit-web
    ports:
      - "3000:80"
    networks:
      - backend-network
    volumes:
      - ./web-ui/public/img:/usr/share/nginx/html/img:ro
    depends_on:
      - zyrabit-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 2. THE MUSCLE: SLM Server (DISABLED - Using Native Metal)
  # zyrabit-engine:
  #   image: ollama/ollama:latest
  #   container_name: zyrabit-engine
  #   environment:
  #     - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ./ollama-models:/root/.ollama
  #   networks:
  #     - model-network

  # 3. THE MEMORY: Vector DB
  zyrabit-db:
    image: chromadb/chroma:latest
    container_name: zyrabit-db
    environment:
      - ANONYMIZED_TELEMETRY=False
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
  model-network:
    driver: bridge
    internal: true
