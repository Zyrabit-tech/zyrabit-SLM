name: zyrabit-slm

services:
  traefik:
    image: traefik:latest
    container_name: zyrabit-traefik
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --metrics.prometheus=true
      - --metrics.prometheus.buckets=0.1,0.3,1.2,5.0
      - --entryPoints.web.address=:80
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --entryPoints.websecure.address=:443
      - --entryPoints.websecure.http.tls=true
      - --api.insecure=true
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080" # Dashboard access
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik:/etc/traefik/dynamic:ro
    networks:
      - zyrabit-sovereign-net

  # 1. THE BRAIN: API RAG
  zyrabit-api:
    image: zyrabit-slm/api-rag
    build:
      context: ..
      dockerfile: zyrabit-slm/api-rag/Dockerfile
    container_name: zyrabit-api
    env_file:
      - .env
    environment:
      - N8N_SERVICE_TOKEN_FILE=/run/secrets/n8n_service_token
      - N8N_WEBHOOK_SIGNING_SECRET_FILE=/run/secrets/n8n_webhook_signing_secret
    depends_on:
      zyrabit-db:
        condition: service_started
      zyrabit-engine:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.zyrabit-api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/v1`) || PathPrefix(`/socket.io`))
      - traefik.http.routers.zyrabit-api.entrypoints=websecure
      - traefik.http.routers.zyrabit-api.tls=true
      - traefik.http.routers.zyrabit-api.middlewares=api-ratelimit@docker,secureHeaders@file
      - traefik.http.services.zyrabit-api.loadbalancer.server.port=8080
      - traefik.http.middlewares.api-ratelimit.ratelimit.average=25
      - traefik.http.middlewares.api-ratelimit.ratelimit.burst=50
      - traefik.docker.network=zyrabit-slm_zyrabit-sovereign-net
    networks:
      - zyrabit-sovereign-net
      - model-network
    volumes:
      - ./secrets:/run/secrets:ro
      - ./prompts:/app/prompts:ro
      - ./document_source:/app/document_source
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 1.5 THE FACE: Web UI
  zyrabit-web:
    image: zyrabit-slm/web-ui
    build:
      context: ..
      dockerfile: zyrabit-slm/web-ui/Dockerfile
    container_name: zyrabit-web
    labels:
      - traefik.enable=true
      - traefik.http.routers.zyrabit-web.rule=Host(`${DOMAIN}`) && PathPrefix(`/`)
      - traefik.http.routers.zyrabit-web.entrypoints=websecure
      - traefik.http.routers.zyrabit-web.tls=true
      - traefik.http.routers.zyrabit-web.middlewares=secureHeaders@file
      - traefik.http.services.zyrabit-web.loadbalancer.server.port=80
      - traefik.docker.network=zyrabit-slm_zyrabit-sovereign-net
    networks:
      - zyrabit-sovereign-net
    depends_on:
      - zyrabit-api

  # 2. THE MUSCLE: SLM Server
  zyrabit-engine:
    image: ollama/ollama:latest
    container_name: zyrabit-engine
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
    volumes:
      - ./ollama-models:/root/.ollama
    networks:
      - model-network
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 2.5 THE SILICON BRIDGE: Tenstorrent TT-MLIR Simulation
  zyrabit-tt-bridge: &tt-base
    build:
      context: ../internal/engine/tenstorrent
      args:
        INSTALL_TENSTORRENT: ${INSTALL_TENSTORRENT:-false}
        TENSTORRENT_PYPI_URL: ${TENSTORRENT_PYPI_URL:-https://pypi.eng.aws.tenstorrent.com/}
    container_name: zyrabit-tt-bridge
    profiles: [ "tenstorrent-sim" ]
    environment:
      - ZYRABIT_TT_MODE=${ZYRABIT_TT_MODE:-mock}
      - ZYRABIT_TT_MODEL_ID=${ZYRABIT_TT_MODEL_ID:-Qwen/Qwen2.5-1.5B-Instruct}
      - ZYRABIT_TT_MIN_RAM_GB=${ZYRABIT_TT_MIN_RAM_GB:-24}
      - ZYRABIT_TT_ALLOW_REMOTE_MODEL=${ZYRABIT_TT_ALLOW_REMOTE_MODEL:-false}
    ports:
      - "8090:8090"
    networks:
      - model-network
    volumes:
      - ./hf-cache:/root/.cache/huggingface/hub
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 2.6 THE METAL BRIDGE: Tenstorrent Bare-Metal Hardware
  zyrabit-tt-metal:
    <<: *tt-base
    container_name: zyrabit-tt-metal
    profiles: [ "tenstorrent" ]
    devices:
      - /dev/tenstorrent:/dev/tenstorrent
    ipc: host

  # 3. THE MEMORY: Vector DB
  zyrabit-db:
    image: chromadb/chroma:latest
    container_name: zyrabit-db
    environment:
      - ANONYMIZED_TELEMETRY=False
      - CHROMA_OTEL_COLLECTION_ENDPOINT=http://localhost:4317
      - CHROMA_OTEL_SERVICE_NAME=zyrabit-vector-db
    volumes:
      - ./chroma-data:/data
    networks:
      - zyrabit-sovereign-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v2/heartbeat\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 4. THE MONITOR (Scraper): Prometheus
  zyrabit-prometheus:
    image: prom/prometheus:latest
    container_name: zyrabit-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.external-url=https://localhost/prometheus
      - --web.route-prefix=/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    labels:
      - traefik.enable=true
      - traefik.http.routers.zyrabit-prometheus.rule=PathPrefix(`/prometheus`)
      - traefik.http.routers.zyrabit-prometheus.entrypoints=websecure
      - traefik.http.routers.zyrabit-prometheus.tls=true
      - traefik.http.routers.zyrabit-prometheus.middlewares=prometheus-auth@docker,secureHeaders@file
      - traefik.http.middlewares.prometheus-auth.basicauth.users=${PROMETHEUS_BASIC_AUTH:?set PROMETHEUS_BASIC_AUTH}
      - traefik.http.services.zyrabit-prometheus.loadbalancer.server.port=9090
      - traefik.docker.network=zyrabit-slm_zyrabit-sovereign-net
    networks:
      - zyrabit-sovereign-net

  # 5. THE MONITOR (Dashboard): Grafana
  zyrabit-grafana:
    image: grafana/grafana:latest
    container_name: zyrabit-grafana
    environment:
      - GF_SERVER_ROOT_URL=https://localhost/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    labels:
      - traefik.enable=true
      - traefik.http.routers.zyrabit-grafana.rule=PathPrefix(`/grafana`)
      - traefik.http.routers.zyrabit-grafana.entrypoints=websecure
      - traefik.http.routers.zyrabit-grafana.tls=true
      - traefik.http.routers.zyrabit-grafana.middlewares=grafana-auth@docker,secureHeaders@file
      - traefik.http.middlewares.grafana-auth.basicauth.users=${GRAFANA_BASIC_AUTH:?set GRAFANA_BASIC_AUTH}
      - traefik.http.services.zyrabit-grafana.loadbalancer.server.port=3000
      - traefik.docker.network=zyrabit-slm_zyrabit-sovereign-net
    depends_on:
      - zyrabit-prometheus
    networks:
      - zyrabit-sovereign-net

  zyrabit-loki:
    image: grafana/loki:latest
    container_name: zyrabit-loki
    command: -config.file=/etc/loki/local-config.yaml
    profiles: [ "observability-extra" ]
    ports:
      - "3100:3100"
    networks:
      - zyrabit-sovereign-net


  zyrabit-n8n:
    image: n8nio/n8n:latest
    container_name: zyrabit-n8n
    profiles: [ "automation" ]
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_PATH=/n8n
      - WEBHOOK_URL=https://localhost/n8n/
      - N8N_SECURE_COOKIE=false
    labels:
      - traefik.enable=true
      - traefik.http.routers.zyrabit-n8n.rule=PathPrefix(`/n8n`)
      - traefik.http.routers.zyrabit-n8n.entrypoints=websecure
      - traefik.http.routers.zyrabit-n8n.tls=true
      - traefik.http.routers.zyrabit-n8n.middlewares=secureHeaders@file
      - traefik.http.services.zyrabit-n8n.loadbalancer.server.port=5678
      - traefik.docker.network=zyrabit-slm_zyrabit-sovereign-net
    volumes:
      - ./n8n-data:/home/node/.n8n
    networks:
      - zyrabit-sovereign-net

  # 6. SYSTEM ASSISTANT: MCP Installer Server
  zyrabit-mcp:
    image: zyrabit-slm/mcp
    build:
      context: ../mcp
    container_name: zyrabit-mcp
    volumes:
      - ../README.md:/app/README.md:ro
      - ../CONTRIBUTING.md:/app/CONTRIBUTING.md:ro
    ports:
      - "8001:8001"
    networks:
      - zyrabit-sovereign-net

networks:
  zyrabit-sovereign-net:
    driver: bridge
  model-network:
    driver: bridge
    internal: true

volumes:
  prometheus-data:
  grafana-data:
