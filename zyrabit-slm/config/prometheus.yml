global:
  scrape_interval: 5s   

scrape_configs:
  - job_name: 'zyrabit-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['zyrabit-api:8080', 'host.docker.internal:8082']

  - job_name: 'traefik'
    static_configs:
      - targets: ['zyrabit-traefik:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']